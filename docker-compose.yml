services:
  mongo:
    image: mongo:7
    container_name: users-mongo
    ports:
      - "27017:27017"

  users-api-service:
    build:
      context: .
      dockerfile: services/users-api-service/Dockerfile
    container_name: users-api-service
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
    ports:
      - "8081:8081"

  users-bff-service:
    build:
      context: .
      dockerfile: services/users-bff-service/Dockerfile
    container_name: users-bff-service
    depends_on:
      - users-api-service
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
    ports:
      - "8080:8080"

  profile-service:
    build:
      context: .
      dockerfile: services/profile-service/Dockerfile
    container_name: profile-service
    depends_on:
      - users-api-service
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/config/config.docker.yaml
    ports:
      - "8082:8082"
